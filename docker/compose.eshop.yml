# eShopOnWeb composition — isolated sandbox (design D1): SQL Server + .NET app/build
# container on a dedicated internal network. Shares nothing with the Medplum composition.
#
# Lifecycle is driven by ../sandbox.sh: `up` starts services, `run` exec's the runner
# into eshop-app, `reset` recreates with fresh volumes, `down` tears everything down.
#
# Host paths are anchored at ${SANDBOX_ROOT} (the repo root). Invoke via sandbox.sh, which
# exports SANDBOX_ROOT; for a direct `docker compose -f …`, export SANDBOX_ROOT first.

name: eshop-sandbox

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"                      # non-interactive EULA (design: headless)
      MSSQL_PID: "Developer"
      # Non-secret sandbox-only credential; must match appsettings.Docker.json.
      MSSQL_SA_PASSWORD: "${ESHOP_SA_PASSWORD:-@someThingComplicated1234}"
    # DB port is NOT published — only reachable on the internal network (isolation spec).
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s                     # SQL Server is slow to become healthy
    mem_limit: 2560m                         # ~2.5 GB — satisfies SQL Server's floor
    cpus: 2.0
    networks: [eshop-net]
    restart: "no"

  eshop-app:
    build:
      context: ${SANDBOX_ROOT}/.upstream/eshop          # pinned upstream checkout (scripts/pins.env)
      dockerfile: ${SANDBOX_ROOT}/docker/eshop/Dockerfile
    image: eshop-sandbox-base:latest
    # Persistent workspace (idles via image CMD = sleep infinity). Source is the bind-mounted
    # host clone at /work (rw): the agent's edits land directly in the host repo, so the harness
    # commits/pushes/PRs from the host. Source clean-state is harness-owned (git); the sandbox
    # resets DB + deps. NuGet is in /nuget (image), outside /work, so the mount can't shadow it.
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Docker         # selects appsettings.Docker.json (sqlserver conn)
      ASPNETCORE_URLS: "http://+:8080"
      # AddSeqEndpoint("seq") throws if this is missing. No Seq server runs in the sandbox;
      # a dummy URL satisfies startup (telemetry export is a no-op, app serves normally).
      ConnectionStrings__seq: "http://localhost:5341"
      NUGET_PACKAGES: /nuget
      MSSQL_SA_PASSWORD: "${ESHOP_SA_PASSWORD:-@someThingComplicated1234}"
      RUN_ID: "${RUN_ID:-local}"
    volumes:
      # Host working copy (a real git checkout), mounted rw — agent edits land here directly.
      - ${SANDBOX_ROOT}/.upstream/eshop:/work
      # Runner is bind-mounted (not baked) so it is editable without an image rebuild.
      - ${SANDBOX_ROOT}/docker/eshop/run-checks.sh:/usr/local/bin/run-checks:ro
      - ${SANDBOX_ROOT}/scripts/lib/results.sh:/usr/local/bin/results.sh:ro
      # Host-accessible results (output-capture spec): survives teardown.
      - ${SANDBOX_ROOT}/results:/results
    ports:
      - "127.0.0.1:${ESHOP_HTTP_PORT:-8080}:8080"   # app HTTP, localhost only
    mem_limit: 4g                            # .NET build/test headroom
    cpus: 4.0
    networks: [eshop-net]
    restart: "no"

networks:
  eshop-net:
    name: eshop-sandbox-net
    driver: bridge
